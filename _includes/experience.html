{% assign theme = site.data.themes[site.ui_theme] %}
  <h4 class="card-title" style="font-family:{{ theme.education-title-font}};color:{{theme.education-font-color}};font-weight:bold;">Experience</h4>
  <ul class="list-unstyled">
  {% for entry in site.data.experience %}
    <li class="media">
      <img src="{{ entry.Icon }}" class="mr-3" alt="..." style="max-width:50px;max-height:50px;">
      <div class="media-body">
        <h5 style="font-family:{{ theme.education-entry-font}};font-size:{{ theme.education-entry-size }};color:{{theme.education-font-color}};">{{ entry.Organization }}</h5>
        <p style="font-family:{{ theme.education-entry-font}};font-size:{{ theme.education-section-size }};color:{{theme.education-font-color}};"><i>{{ entry.Role }}, {{ entry.Team }} ({{ entry.Period }})</i></p>
      </div>
    </li>
    {% endfor %}
  </ul>
